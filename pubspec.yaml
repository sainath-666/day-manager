name: dailyflow
description: Personal task management, reminders, and expense tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  go_router: ^14.2.0

  flutter_local_notifications: ^17.2.1
  flutter_timezone: ^4.1.0
  timezone: ^0.9.4

  fl_chart: ^0.67.0

  uuid: ^4.4.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  share_plus: ^10.0.0

  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/seed_data.json
    - assets/images/
